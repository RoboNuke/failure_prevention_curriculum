# Default config — values reproduce the runner's prior hardcoded behavior.
# Every registered ConfigManager header must appear; every key under a header
# must match a dataclass field exactly. Unknown headers/keys are hard errors.

sac_cfg:
  gradient_steps: 1
  batch_size: 512                  # std SAC range; was 4096 (too large)
  discount_factor: 0.99
  polyak: 0.005
  learning_rate: 1.0e-4            # matches Isaac Lab Lift PPO baseline; was 3e-4
  random_timesteps: 1000
  learning_starts: 1000
  learn_entropy: true
  initial_entropy_value: 0.2
  target_entropy: null            # null => skrl picks -|A|
  grad_norm_clip: 0.0
  mixed_precision: false
  observation_preprocessor: RunningStandardScaler   # critical for Lift's heterogeneous obs scales
  observation_preprocessor_kwargs: {}               # runner injects {size, device} from env
  predict_success: false
  success_bce_weight: 1.0
  success_info_key: is_success
  success_wrapper: null            # set to "lift" (and predict_success: true) for Lift
  experiment:
    directory: runs
    experiment_name: ""           # empty => runner auto-generates as <task>_sac_N<num_agents>
    write_interval: auto
    checkpoint_interval: auto

model_cfg:
  actor:
    act_init_std: 1.0
    actor_n: 2
    actor_latent: 256
    last_layer_scale: 0.01            # standard SAC trick: tiny init -> small initial actions, less tanh saturation
    clip_log_std: true
    min_log_std: -20.0
    max_log_std: 2.0
    reduction: sum
    use_state_dependent_std: false
  critic:
    critic_output_init_mean: 0.0
    critic_n: 3
    critic_latent: 1024
    clip_actions: false
